<h1>Day 1: Logarithms Basics</h1>

<p>Today I learned:</p>

<ul>
  <li>log(a × b) = log(a) + log(b)</li>
</ul>

<p>Example:</p>

<p>log(10 × 100) = log(10) + log(100)</p>
